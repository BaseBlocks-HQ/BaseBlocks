name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

jobs:
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: millionco/react-doctor@main
        with:
          commit-status: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile

      - name: Biome lint
        run: bunx biome check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile

      - run: bun run check-types

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile

      - run: bun run test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [react-doctor, lint, typecheck, test]
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_CONVEX_URL: "https://placeholder.convex.cloud"
          NEXT_PUBLIC_CONVEX_SITE_URL: "https://placeholder.convex.site"
          NEXT_PUBLIC_ROOT_DOMAIN: "baseblocks.dev"
          FILES_ADAPTER: "s3"
          FILES_BUCKET: "placeholder-bucket"
          FILES_ENDPOINT: "https://example.invalid"
          FILES_REGION: "us-east-1"
          FILES_FORCE_PATH_STYLE: "true"
          FILES_ACCESS_KEY_ID: "placeholder"
          FILES_SECRET_ACCESS_KEY: "placeholder"
          FILES_MAX_UPLOAD_SIZE_BYTES: "104857600"
          FILES_API_SECRET: "placeholder"
