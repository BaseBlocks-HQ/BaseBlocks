name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  react-doctor:
    name: React Doctor
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: millionco/react-doctor@main
        with:
          diff: ${{ github.event_name == 'pull_request' && 'main' || github.event.before }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      - run: bun install --frozen-lockfile

      - name: Biome lint
        run: bunx biome check .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      - run: bun install --frozen-lockfile

      - run: bun run check-types

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [react-doctor, lint, typecheck]
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.1"

      - run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          NEXT_PUBLIC_CONVEX_URL: "https://placeholder.convex.cloud"
          NEXT_PUBLIC_CONVEX_SITE_URL: "https://placeholder.convex.site"
          NEXT_PUBLIC_ROOT_DOMAIN: "baseblocks.dev"
          STORAGE_BUCKET_NAME: "placeholder-bucket"
          STORAGE_ENDPOINT: "https://example.invalid"
          STORAGE_REGION: "us-east-1"
          STORAGE_ACCESS_KEY_ID: "placeholder"
          STORAGE_SECRET_ACCESS_KEY: "placeholder"
